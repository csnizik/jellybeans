name: deps-label-issues
on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled, assigned, closed]
  schedule:
    - cron: '*/30 * * * *'  # also refresh every 30 minutes

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const num = context.payload?.issue?.number;
            if (!num) { core.info('No single issue context (cron run).'); return; }
            const { data } = await github.request(
              'GET /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocked_by',
              { owner, repo, issue_number: num }
            );
            const openBlockers = data.filter(i => i.state === 'open').map(i => i.number);
            const labels = context.payload.issue.labels.map(l=>l.name);
            const hasBlocked = labels.includes('blocked');

            if (openBlockers.length && !hasBlocked) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: ['blocked'] });
            }
            if (!openBlockers.length && hasBlocked) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: num, name: 'blocked' }).catch(()=>{});
            }
