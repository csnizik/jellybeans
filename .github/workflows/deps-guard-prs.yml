name: deps-guard-prs
on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read
  issues: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const body = context.payload.pull_request.body || '';
            // Closing keywords GitHub recognizes: close(s)/fix(es)/resolve(s) #123. :contentReference[oaicite:10]{index=10}
            const re = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/gi;
            const issueNumbers = [...new Set((body.match(re)||[]).map(m => parseInt(m.match(/#(\d+)/)[1],10)))];
            const blocked = [];
            for (const n of issueNumbers) {
              const { data } = await github.request('GET /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocked_by', { owner, repo, issue_number: n });
              const openBlockers = (data||[]).filter(i => i.state === 'open').map(i => i.number);
              if (openBlockers.length) blocked.push({issue:n, blockers:openBlockers});
            }
            if (blocked.length) {
              core.setFailed('PR attempts to close blocked issues:\n' + blocked.map(b => `- #${b.issue} is blocked by #${b.blockers.join(', #')}`).join('\n'));
            }
