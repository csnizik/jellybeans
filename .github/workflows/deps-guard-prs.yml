name: deps-guard-prs
on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read
  issues: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Block PR if it closes blocked issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const body = context.payload.pull_request.body || '';
            // Detect closing keywords (GitHub supports close(s)/fix(es)/resolve(s) #NNN)
            const re = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/gi;
            const matches = [...body.matchAll(re)] || [];
            const issueNumbers = [...new Set(matches.map(m => parseInt(m[0].match(/#(\d+)/)[1],10)))];

            let blocked = [];
            for (const n of issueNumbers) {
              // Official "issue dependencies" REST API: list dependencies this issue is blocked by
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocked_by',
                { owner, repo, issue_number: n }
              );
              const openBlockers = data.filter(i => i.state === 'open').map(i => i.number);
              if (openBlockers.length) blocked.push({issue:n, blockers:openBlockers});
            }

            if (blocked.length) {
              core.setFailed(
                'PR references closing blocked issues:\n' +
                blocked.map(b => `- #${b.issue} is blocked by #${b.blockers.join(', #')}`).join('\n')
              );
            }
