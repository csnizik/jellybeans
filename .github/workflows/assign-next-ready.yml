name: Assign next ready issue to Copilot
on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  next:
    if: startsWith(join(github.event.issue.labels.*.name, ' '), ' parent-epic-') || contains(join(github.event.issue.labels.*.name, ','), 'parent-epic-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const labels = (context.payload.issue.labels||[]).map(l => typeof l==='string'? l : l.name);
            const epicLabel = labels.find(l => l.startsWith('parent-epic-'));
            if (!epicLabel) return;

            // Fetch open siblings for the same epic
            let page=1, openIssues=[];
            while (true) {
              const { data } = await github.rest.issues.listForRepo({ owner, repo, state:'open', labels: epicLabel, per_page:100, page });
              if (!data.length) break;
              openIssues.push(...data);
              page++;
            }

            // Pick the first with zero open blockers and not already assigned to Copilot
            for (const it of openIssues) {
              const hasCopilot = (it.assignees||[]).some(a => a.login==='github-copilot');
              if (hasCopilot) continue;
              const { data } = await github.request('GET /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocked_by', { owner, repo, issue_number: it.number });
              const openBlockers = (data||[]).filter(i => i.state==='open').length;
              if (openBlockers===0) {
                try {
                  await github.rest.issues.addAssignees({ owner, repo, issue_number: it.number, assignees: ['github-copilot'] });
                  await github.rest.issues.createComment({ owner, repo, issue_number: it.number, body: '✅ Previous blocker closed. Assigned to @github-copilot to start.' });
                } catch(e) {}
                break;
              }
            }
