name: Build, Push & Deploy to Staging

on:
  push:
    branches: [ develop ]

env:
  REGISTRY: acrasegrinprod01.azurecr.us
  IMAGE_NAME: ars-apps-drupal-rep
  AZURE_WEBAPP_NAME: ARS-VA-BETA-APPS

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # - name: Deploy to Azure Web App
      #   uses: azure/webapps-deploy@v2
      #   with:
      #     app-name: ${{ env.AZURE_WEBAPP_NAME }}
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      #     images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure container via ARM API and restart
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config container set \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --container-image-name ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              --container-registry-url https://${{ env.REGISTRY }} \
              --container-registry-user ${{ secrets.ACR_USERNAME }} \
              --container-registry-password ${{ secrets.ACR_PASSWORD }}
            az webapp restart \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_WEBAPP_NAME }}
