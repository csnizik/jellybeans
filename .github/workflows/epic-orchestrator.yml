name: Epic → Stories Orchestrator

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  issues: write
  contents: read
  pull-requests: write
  models: read   # required to call GitHub Models from Actions

env:
  MODEL_ID: openai/gpt-4.1  # available through GitHub Models

jobs:
  plan-seed:
    if: contains(join(github.event.issue.labels.*.name, ','), 'epic')
    runs-on: ubuntu-latest
    steps:
      - name: Capture epic
        id: epic
        uses: actions/github-script@v7
        with:
          script: |
            core.setOutput('number', String(context.payload.issue.number));
            core.setOutput('title',  context.payload.issue.title || '');
            core.setOutput('body',   context.payload.issue.body  || '');

      - name: Ask AI to turn epic into ordered plan (strict JSON object)
        id: ai
        env:
          EPIC_TITLE: ${{ steps.epic.outputs.title }}
          EPIC_BODY:  ${{ steps.epic.outputs.body }}
          MODEL_ID:   ${{ env.MODEL_ID }}
          GITHUB_TOKEN: ${{ github.token }}  # bind token for curl
        run: |
          set -euo pipefail

          # Build the request JSON safely (escapes quotes/newlines)
          jq -n \
            --arg model "$MODEL_ID" \
            --arg title "$EPIC_TITLE" \
            --arg body  "$EPIC_BODY" \
            '{
              model: $model,
              response_format: { type: "json_object" },
              temperature: 0.2,
              max_tokens: 3000,
              messages: [
                {
                  role: "system",
                  content: "You are a senior delivery lead for Drupal 11 migrations. Produce a dependency-aware work plan that a CI bot can execute as-is."
                },
                {
                  role: "user",
                  content: ("EPIC TITLE:\n" + $title + "\n\nEPIC TEXT:\n" + $body + "\n\nRules: split into 0.5–2 day issues; use sub-issues to enforce sequencing; add depends_on_titles to express ordering; return ONLY a single JSON object with { \"stories\": [...] }.")
                }
              ]
            }' > request.json

          # Call GitHub Models REST API (requires permissions: models: read).
          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            https://models.github.ai/inference/chat/completions \
            -d @request.json)

          if [ "$http_code" -ne 200 ]; then
            echo "::error::GitHub Models API HTTP $http_code"
            echo "---- response.json ----"
            cat response.json || true
            echo "-----------------------"
            exit 1
          fi

          # Extract model output and ensure it's a JSON object with .stories[]
          jq -re '
            .choices[0].message.content
            | (if type=="string" then fromjson else . end)
            | . as $root
            | (has("stories") and (.stories|type=="array")) as $ok
            | if $ok then $root else error("missing or invalid .stories") end
          ' response.json > plan.json

          echo "Plan OK:"
          jq '.stories | length as $n | "stories=\($n)"' plan.json

      - name: Create issues, sub-issues, dependencies; assign first ready
        id: seed
        uses: actions/github-script@v7
        env:
          EPIC_NUMBER: ${{ steps.epic.outputs.number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const plan = JSON.parse(fs.readFileSync('plan.json','utf8'));
            const owner = context.repo.owner, repo = context.repo.repo;
            const epicNumber = Number(process.env.EPIC_NUMBER);
            const parentLabel = `parent-epic-${epicNumber}`;

            // Load /docs/story-template.md if present
            let template = null;
            try {
              const p = path.join(process.env.GITHUB_WORKSPACE || process.cwd(), 'docs', 'story-template.md');
              if (fs.existsSync(p)) template = fs.readFileSync(p, 'utf8');
            } catch (e) { /* ignore */ }

            // Render body using template if available; otherwise use AI-provided body as-is (no fallback template)
            function renderBody(title, aiBody) {
              const ai = (aiBody || '').trim();
              if (template) {
                let b = template;
                b = b.replace(/\{\{\s*TITLE\s*\}\}/gi, title);
                b = b.replace(/\{\{\s*DESCRIPTION\s*\}\}/gi, ai);
                b = b.replace(/\{\{\s*ACCEPTANCE_CRITERIA\s*\}\}/gi, '');
                b = b.replace(/\{\{\s*FUNCTIONAL_REQUIREMENTS\s*\}\}/gi, '');
                b = b.replace(/\{\{\s*TECHNICAL_IMPLEMENTATION_PLAN\s*\}\}/gi, '');
                b = b.replace(/\{\{\s*QA_STEPS\s*\}\}/gi, '');
                return b;
              }
              return ai;
            }

            const created = new Map(); // titleLower -> {number,id}
            async function createIssue(input, extra=[]) {
              const title = String(input.title || '').trim();
              const desc  = renderBody(title, input.body || '');
              const lab = Array.from(new Set([...(input.labels||[]), parentLabel, ...extra]));
              const { data } = await github.rest.issues.create({ owner, repo, title, body: desc, labels: lab });
              created.set(title.toLowerCase(), { number: data.number, id: data.id });
              return data;
            }

            // 1) Create stories and sub-issues
            for (const s of (plan.stories||[])) {
              if (!s.title) continue;
              const story = await createIssue(s, ['story']);
              for (const sub of (s.sub_issues||[])) {
                if (!sub.title) continue;
                const subIssue = await createIssue(sub, ['subissue']);
                // Make it a sub-issue of the story (parent relationship).
                await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                  owner, repo, issue_number: story.number, sub_issue_id: subIssue.id
                });
                // If no explicit depends_on, make sub depend on parent story
                if (!sub.depends_on_titles || sub.depends_on_titles.length === 0) {
                  sub.depends_on_titles = [s.title];
                }
              }
            }

            // Fallback storage for dependencies when API is unavailable (404)
            const depsCache = new Map(); // issue_number -> {comment_id, blocked_by_numbers:Set<number>}
            async function loadDepsMeta(issue_number) {
              if (depsCache.has(issue_number)) return depsCache.get(issue_number);
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
              const marker = '<!-- deps-meta:';
              let found = null;
              for (const c of comments) {
                if (c.body && c.body.includes(marker)) { found = c; break; }
              }
              let info = { comment_id: found?.id || null, blocked_by_numbers: new Set() };
              if (found) {
                const m = found.body.match(/<!-- deps-meta:\s*({[\s\S]*?})\s*-->/);
                if (m) {
                  try {
                    const json = JSON.parse(m[1]);
                    for (const n of (json.blocked_by_numbers||[])) info.blocked_by_numbers.add(n);
                  } catch {}
                }
              }
              depsCache.set(issue_number, info);
              return info;
            }
            async function saveDepsMeta(issue_number, info) {
              const body = `<!-- deps-meta: ${JSON.stringify({ blocked_by_numbers: Array.from(info.blocked_by_numbers) })} -->`;
              if (info.comment_id) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: info.comment_id, body });
              } else {
                const { data } = await github.rest.issues.createComment({ owner, repo, issue_number, body });
                info.comment_id = data.id;
              }
            }
            async function upsertDepsMeta(issue_number, blocker_number) {
              const info = await loadDepsMeta(issue_number);
              info.blocked_by_numbers.add(blocker_number);
              await saveDepsMeta(issue_number, info);
            }

            // 2) Wire dependencies (blocked_by) using Issue Dependencies API (with graceful 404 fallback).
            async function addBlockedBy(laterNum, blockerId, blockerNum) {
              try {
                await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocked_by', {
                  owner, repo, issue_number: laterNum, issue_id: blockerId,
                  headers: { accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' }
                });
              } catch (e) {
                if (e.status === 404) {
                  // Feature not available on this repo/account – store fallback metadata
                  await upsertDepsMeta(laterNum, blockerNum);
                } else {
                  throw e;
                }
              }
            }
            function getCreated(title) { return created.get(String(title||'').toLowerCase()); }

            for (const s of (plan.stories||[])) {
              const later = getCreated(s.title);
              for (const t of (s.depends_on_titles||[])) {
                const blocker = getCreated(t); if (later && blocker) await addBlockedBy(later.number, blocker.id, blocker.number);
              }
              for (const sub of (s.sub_issues||[])) {
                const laterSub = getCreated(sub.title);
                for (const t of (sub.depends_on_titles||[])) {
                  const blocker = getCreated(t); if (laterSub && blocker) await addBlockedBy(laterSub.number, blocker.id, blocker.number);
                }
              }
            }

            // 3) Assign first UNBLOCKED item to github-copilot to start the coding agent.
            async function listOpenBlockers(n) {
              try {
                const { data } = await github.request('GET /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocked_by', {
                  owner, repo, issue_number: n,
                  headers: { accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' }
                });
                return (data||[]).filter(i => i.state === 'open').map(i => i.number);
              } catch (e) {
                if (e.status === 404) {
                  // Fallback: read our stored metadata and check those issues' states
                  const info = await loadDepsMeta(n);
                  const nums = Array.from(info.blocked_by_numbers);
                  const open = [];
                  for (const num of nums) {
                    try {
                      const { data } = await github.rest.issues.get({ owner, repo, issue_number: num });
                      if (data.state === 'open') open.push(num);
                    } catch {}
                  }
                  return open;
                } else {
                  throw e;
                }
              }
            }
            for (const { number } of created.values()) {
              const blockers = await listOpenBlockers(number);
              if (blockers.length === 0) {
                try {
                  await github.rest.issues.addAssignees({ owner, repo, issue_number: number, assignees: ['github-copilot'] });
                  await github.rest.issues.createComment({ owner, repo, issue_number: number, body: '🤖 Assigned to @github-copilot to start.' });
                  break;
                } catch { /* Copilot not enabled or no access; skip silently */ }
              }
            }
