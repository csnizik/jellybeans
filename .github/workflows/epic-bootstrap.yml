name: Epic bootstrap
on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  bootstrap:
    if: contains(join(github.event.issue.labels.*.name, ','), 'epic')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create branch for epic
        id: mkbranch
        uses: actions/github-script@v7
        with:
          script: |
            const epicTitle = context.payload.issue.title
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/(^-|-$)/g, '');
            const branch = `epic/${epicTitle.substring(0, 60)}`;
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${context.payload.repository.default_branch || 'main'}`
            });
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branch}`,
                sha: ref.object.sha
              });
            } catch (e) {
              core.info(`Branch may already exist: ${e.message}`);
            }
            core.setOutput('branch', branch);

      - name: Seed docs/epics file
        uses: actions/github-script@v7
        with:
          script: |
            const branch = core.getInput('branch') || core.getState('branch') || '${{ steps.mkbranch.outputs.branch }}';
            const path = `docs/epics/${branch}.md`;
            const content = `# ${context.payload.issue.title}\n\nParent epic: #${context.payload.issue.number}\n\n- Scope: Drupal 11 → Drupal 11 content migration (ars-apps → this site)\n- Tracking: GitHub Project: ${{ vars.PROJECT_URL }}\n\n`;
            const { data: latest } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: path, ref: branch
            }).catch(() => ({ data: null }));
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: `docs(epic): seed ${path}`,
              content: Buffer.from(content, 'utf8').toString('base64'),
              branch,
              sha: latest?.sha
            });

      - name: Create child stories
        id: makestories
        uses: actions/github-script@v7
        with:
          script: |
            const epic = context.payload.issue.number;
            const stories = [
              { t: 'Decide source mechanism (DB vs JSON:API) and credentials', b: 'Pick ONE: remote DB (read-only) or JSON:API fetch from ars-apps. Document auth, base URL/host, and rate limits. Link to epic #' + epic },
              { t: 'Create custom module: ars_apps_migrate', b: 'Composer deps, module skeleton, migrations directory. Link to epic #' + epic },
              { t: 'Create migration group: ars_apps', b: 'migrate_plus group with shared http/db config; env overrides via settings.php. Link to epic #' + epic },
              { t: 'Author taxonomy migrations', b: 'All vocabularies used by target bundles; map term UUIDs. Link to epic #' + epic },
              { t: 'Author files/media migrations', b: 'Files, images, media entities; file download/storage; reference remap. Link to epic #' + epic },
              { t: 'Author node migrations (phase 1)', b: 'Pick one bundle (e.g., page). Map fields, authors, dates, refs. Link to epic #' + epic },
              { t: 'Dry-run import locally', b: 'drush ms; mim --limit; validate; rollback. Link to epic #' + epic },
              { t: 'Node migrations (phase 2+)', b: 'Remaining bundles. Link to epic #' + epic },
              { t: 'Finalize + switch-over plan', b: 'Freeze window, delta migration, verification, backout. Link to epic #' + epic }
            ];
            const created = [];
            for (const s of stories) {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: s.t, body: s.b, labels: ['story','migration']
              });
              // Link child to epic
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: epic,
                body: `- [ ] #${issue.number} ${s.t}`
              });
              created.push(issue.number);
            }
            core.setOutput('story_list', created.join(','));

      - name: Add items to Project (optional)
        if: ${{ vars.PROJECT_URL != '' }}
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.PROJECT_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          item-title: ${{ github.event.issue.title }}

      - name: Open draft PR for epic branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.mkbranch.outputs.branch }}';
            const base = context.payload.repository.default_branch || 'main';
            try {
              await github.rest.pulls.create({
                owner: context.repo.owner, repo: context.repo.repo,
                head: branch, base, title: `Draft: ${context.payload.issue.title}`,
                body: `Closes #${context.payload.issue.number} (eventually).`
              });
            } catch(e) {
              core.info(`PR may already exist: ${e.message}`);
            }
