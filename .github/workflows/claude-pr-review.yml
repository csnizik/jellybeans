# timestamp: 2025-08-15T19:00-05:00
name: claude-pr-review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  contents: read
  pull-requests: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Claude Code PR review
        uses: anthropics/claude-code-action@v0.2
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          task: "review"
          instructions: |
            Review this Drupal 11 PR for: security (OWASP/Drupal SA), performance, coding standards, schema updates,
            config sync hygiene, and test coverage. For findings, leave GitHub PR review comments with precise diffs.
          # Prefer a 1× model for cost control; switch higher only when needed:
          model: "claude-3-5-sonnet-latest"
