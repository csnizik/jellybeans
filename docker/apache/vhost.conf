<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/web
    
    <Directory /var/www/html/web>
        AllowOverride All
        Require all granted
    </Directory>
    
    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    
    # Performance headers
    Header always set Cache-Control "no-cache, no-store, must-revalidate" "expr=%{REQUEST_URI} =~ m#^/admin#"
    
    # Drupal specific configurations
    <LocationMatch "^/(core/|profiles/|modules/|themes/|libraries/).*\.(php|phar)$">
        Require all denied
    </LocationMatch>
    
    <LocationMatch "^/sites/.*/files/.*\.(php|phar)$">
        Require all denied
    </LocationMatch>
    
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>